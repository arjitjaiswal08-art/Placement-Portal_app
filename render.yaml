services:
  - type: web
    name: placement-portal
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: placement-db
          property: connectionString

databases:
  - name: placement-db
    databaseName: placement_portal
    user: placement_user
